
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0c11; }
    @keyframes pw-beam { 0% { stroke-dashoffset: 0.35; } 38% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
    @keyframes pw-mid { 0%, 26% { stroke-dashoffset: 0.35; } 54% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
    @keyframes pw-ray { 0%, 42% { stroke-dashoffset: 0.35; } 88% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
    @keyframes pw-flash { 0%, 22% { opacity: 0; } 40% { opacity: 0.4; } 64%, 100% { opacity: 0; } }
  </style>
</helmet>
<div style="--dur: {{ durVar }}; --pg: {{ glowVar }}; min-height: 100vh; background: #0a0c11; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 56px; font-family: ui-monospace, 'SF Mono', Menlo, monospace;">

  <!-- hero preview -->
  <div style="display: flex; flex-direction: column; align-items: center; gap: 14px;">
    <svg width="96" height="96" viewBox="0 0 64 64" style="overflow: visible;">
      <line x1="2" y1="40" x2="23.5" y2="30" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="14" stroke="#ff3b5c" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="20.4" stroke="#ff9f1c" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="26.8" stroke="#ffe14d" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="33.2" stroke="#4ade80" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="39.6" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <line x1="40.5" y1="30" x2="62" y2="46" stroke="#a78bfa" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"></line>
      <polygon points="32,13 15,47 49,47" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.6)" stroke-width="1.6" stroke-linejoin="round"></polygon>
      <polygon points="32,13 15,47 49,47" fill="#ffffff" style="opacity: 0; animation: pw-flash var(--dur, 2s) linear infinite;"></polygon>
      <line x1="23.5" y1="30" x2="40.5" y2="30" pathLength="1" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-mid var(--dur, 2s) linear infinite;"></line>
      <line x1="2" y1="40" x2="23.5" y2="30" pathLength="1" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-beam var(--dur, 2s) linear infinite; filter: var(--pg, drop-shadow(0 0 3px rgba(255,255,255,0.55)));"></line>
      <line x1="40.5" y1="30" x2="62" y2="14" pathLength="1" stroke="#ff3b5c" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; filter: var(--pg, drop-shadow(0 0 3px #ff3b5c));"></line>
      <line x1="40.5" y1="30" x2="62" y2="20.4" pathLength="1" stroke="#ff9f1c" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.015); filter: var(--pg, drop-shadow(0 0 3px #ff9f1c));"></line>
      <line x1="40.5" y1="30" x2="62" y2="26.8" pathLength="1" stroke="#ffe14d" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.03); filter: var(--pg, drop-shadow(0 0 3px #ffe14d));"></line>
      <line x1="40.5" y1="30" x2="62" y2="33.2" pathLength="1" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.045); filter: var(--pg, drop-shadow(0 0 3px #4ade80));"></line>
      <line x1="40.5" y1="30" x2="62" y2="39.6" pathLength="1" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.06); filter: var(--pg, drop-shadow(0 0 3px #38bdf8));"></line>
      <line x1="40.5" y1="30" x2="62" y2="46" pathLength="1" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.075); filter: var(--pg, drop-shadow(0 0 3px #a78bfa));"></line>
    </svg>
    <div style="font-size: 11px; letter-spacing: 0.08em; color: #4d5666;">96px · preview</div>
  </div>

  <!-- inline sizes -->
  <div style="display: flex; align-items: flex-end; gap: 48px;">
    <sc-for list="{{ sizes }}" as="s" hint-placeholder-count="3">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
        <svg width="{{ s.px }}" height="{{ s.px }}" viewBox="0 0 64 64" style="overflow: visible;">
          <line x1="2" y1="40" x2="23.5" y2="30" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="14" stroke="#ff3b5c" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="20.4" stroke="#ff9f1c" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="26.8" stroke="#ffe14d" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="33.2" stroke="#4ade80" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="39.6" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="40.5" y1="30" x2="62" y2="46" stroke="#a78bfa" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"></line>
          <polygon points="32,13 15,47 49,47" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linejoin="round"></polygon>
          <polygon points="32,13 15,47 49,47" fill="#ffffff" style="opacity: 0; animation: pw-flash var(--dur, 2s) linear infinite;"></polygon>
          <line x1="23.5" y1="30" x2="40.5" y2="30" pathLength="1" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-mid var(--dur, 2s) linear infinite;"></line>
          <line x1="2" y1="40" x2="23.5" y2="30" pathLength="1" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-beam var(--dur, 2s) linear infinite; filter: var(--pg, drop-shadow(0 0 2px rgba(255,255,255,0.55)));"></line>
          <line x1="40.5" y1="30" x2="62" y2="14" pathLength="1" stroke="#ff3b5c" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; filter: var(--pg, drop-shadow(0 0 2px #ff3b5c));"></line>
          <line x1="40.5" y1="30" x2="62" y2="20.4" pathLength="1" stroke="#ff9f1c" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.015); filter: var(--pg, drop-shadow(0 0 2px #ff9f1c));"></line>
          <line x1="40.5" y1="30" x2="62" y2="26.8" pathLength="1" stroke="#ffe14d" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.03); filter: var(--pg, drop-shadow(0 0 2px #ffe14d));"></line>
          <line x1="40.5" y1="30" x2="62" y2="33.2" pathLength="1" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.045); filter: var(--pg, drop-shadow(0 0 2px #4ade80));"></line>
          <line x1="40.5" y1="30" x2="62" y2="39.6" pathLength="1" stroke="#38bdf8" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.06); filter: var(--pg, drop-shadow(0 0 2px #38bdf8));"></line>
          <line x1="40.5" y1="30" x2="62" y2="46" pathLength="1" stroke="#a78bfa" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="stroke-dashoffset: 0.35; animation: pw-ray var(--dur, 2s) linear infinite; animation-delay: calc(var(--dur, 2s) * 0.075); filter: var(--pg, drop-shadow(0 0 2px #a78bfa));"></line>
        </svg>
        <div style="font-size: 11px; letter-spacing: 0.08em; color: #4d5666;">{{ s.px }}px</div>
      </div>
    </sc-for>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 720, &quot;height&quot;: 480 },
  &quot;loopSecs&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 2, &quot;min&quot;: 0.5, &quot;max&quot;: 6, &quot;step&quot;: 0.5, &quot;unit&quot;: &quot;s&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Animation&quot; },
  &quot;glow&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Animation&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const secs = this.props.loopSecs ?? 2;
    const glow = this.props.glow ?? true;
    return {
      durVar: secs + 's',
      glowVar: glow ? '' : 'none',
      sizes: [{ px: 24 }, { px: 32 }, { px: 48 }],
    };
  }
}
</script>
</body>
</html>
