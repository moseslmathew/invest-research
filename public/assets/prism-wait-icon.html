<!DOCTYPE html>
<!-- Lumina prism wait icon — self-contained, dark + light theme variants.
     Copy the <style> block and the <svg> you need into your app.
     Control speed with the --dur CSS variable on the svg (default 2s). -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; min-height: 100vh; display: flex; }
  .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; letter-spacing: 0.08em; }
  .panel--dark { background: #0a0c11; color: #4d5666; }
  .panel--light { background: #f5f6f8; color: #8a92a3; }
  @keyframes pw-beam { 0% { stroke-dashoffset: 0.35; } 38% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
  @keyframes pw-mid { 0%, 26% { stroke-dashoffset: 0.35; } 54% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
  @keyframes pw-ray { 0%, 42% { stroke-dashoffset: 0.35; } 88% { stroke-dashoffset: -1; } 100% { stroke-dashoffset: -1; } }
  @keyframes pw-flash { 0%, 22% { opacity: 0; } 40% { opacity: 0.4; } 64%, 100% { opacity: 0; } }
  .pw-beam { animation: pw-beam var(--dur, 2s) linear infinite; }
  .pw-mid { animation: pw-mid var(--dur, 2s) linear infinite; }
  .pw-flash { opacity: 0; animation: pw-flash var(--dur, 2s) linear infinite; }
  .pw-ray { animation: pw-ray var(--dur, 2s) linear infinite; }
</style>
</head>
<body>

<div class="panel panel--dark">
  <!-- DARK THEME (for dark backgrounds) -->
  <svg class="prism-wait prism-wait--dark" width="48" height="48" viewBox="0 0 64 64" style="overflow: visible; --dur: 2s;">
    <line x1="2" y1="40" x2="23.5" y2="30" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="14" stroke="#ff3b5c" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="20.4" stroke="#ff9f1c" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="26.8" stroke="#ffe14d" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="33.2" stroke="#4ade80" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="39.6" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="46" stroke="#a78bfa" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <polygon points="32,13 15,47 49,47" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linejoin="round"/>
    <polygon class="pw-flash" points="32,13 15,47 49,47" fill="#ffffff"/>
    <line class="pw-mid" x1="23.5" y1="30" x2="40.5" y2="30" pathLength="1" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1"/>
    <line class="pw-beam" x1="2" y1="40" x2="23.5" y2="30" pathLength="1" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="0.35 1" style="filter: drop-shadow(0 0 2px rgba(255,255,255,0.55));"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="14" pathLength="1" stroke="#ff3b5c" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="filter: drop-shadow(0 0 2px #ff3b5c);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="20.4" pathLength="1" stroke="#ff9f1c" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.015); filter: drop-shadow(0 0 2px #ff9f1c);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="26.8" pathLength="1" stroke="#ffe14d" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.03); filter: drop-shadow(0 0 2px #ffe14d);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="33.2" pathLength="1" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.045); filter: drop-shadow(0 0 2px #4ade80);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="39.6" pathLength="1" stroke="#38bdf8" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.06); filter: drop-shadow(0 0 2px #38bdf8);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="46" pathLength="1" stroke="#a78bfa" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.075); filter: drop-shadow(0 0 2px #a78bfa);"/>
  </svg>
  <div>dark theme</div>
</div>

<div class="panel panel--light">
  <!-- LIGHT THEME (for light backgrounds) -->
  <svg class="prism-wait prism-wait--light" width="48" height="48" viewBox="0 0 64 64" style="overflow: visible; --dur: 2s;">
    <line x1="2" y1="40" x2="23.5" y2="30" stroke="#232c3d" stroke-opacity="0.18" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="14" stroke="#e8274b" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="20.4" stroke="#f28c0d" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="26.8" stroke="#eec513" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="33.2" stroke="#22b566" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="39.6" stroke="#1e9be0" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="40.5" y1="30" x2="62" y2="46" stroke="#8b63ef" stroke-opacity="0.2" stroke-width="2.4" stroke-linecap="round"/>
    <polygon points="32,13 15,47 49,47" fill="rgba(24,32,48,0.05)" stroke="rgba(35,44,61,0.75)" stroke-width="2" stroke-linejoin="round"/>
    <polygon class="pw-flash" points="32,13 15,47 49,47" fill="#232c3d" style="animation-name: pw-flash;"/>
    <line class="pw-mid" x1="23.5" y1="30" x2="40.5" y2="30" pathLength="1" stroke="#232c3d" stroke-opacity="0.85" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1"/>
    <line class="pw-beam" x1="2" y1="40" x2="23.5" y2="30" pathLength="1" stroke="#232c3d" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="0.35 1"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="14" pathLength="1" stroke="#e8274b" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="20.4" pathLength="1" stroke="#f28c0d" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.015);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="26.8" pathLength="1" stroke="#eec513" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.03);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="33.2" pathLength="1" stroke="#22b566" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.045);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="39.6" pathLength="1" stroke="#1e9be0" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.06);"/>
    <line class="pw-ray" x1="40.5" y1="30" x2="62" y2="46" pathLength="1" stroke="#8b63ef" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.35 1" style="animation-delay: calc(var(--dur, 2s) * 0.075);"/>
  </svg>
  <div>light theme</div>
</div>

</body>
</html>
